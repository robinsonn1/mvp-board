<!DOCTYPE html>
<html>
<head>
    <title>World Cup Live Engine</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* ---------------- BACKGROUND ---------------- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("https://images.unsplash.com/photo-1508098682722-e99c43a406b2");
            background-size: cover;
            opacity: 0.15;
            z-index: -1;
        }

        /* ---------------- TOP BAR ---------------- */
        .topbar {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(17, 24, 39, 0.9);
            border-bottom: 1px solid #1f2937;
            backdrop-filter: blur(8px);
        }

        .live {
            color: red;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .score {
            font-size: 22px;
            font-weight: bold;
        }

        .minute {
            color: #9ca3af;
        }

        /* ---------------- CONTAINER ---------------- */
        .container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .panel {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px;
            height: 78vh;
            overflow-y: auto;
        }

        /* ---------------- PLAYER ROW ---------------- */
        .player {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .player:hover {
            transform: scale(1.02);
        }

        .name {
            width: 150px;
            font-size: 12px;
        }

        .bar {
            height: 6px;
            border-radius: 4px;
        }

        .scoreval {
            font-size: 12px;
        }

        /* ---------------- TEAM COLORS ---------------- */
        .Spain { background: rgba(255, 0, 0, 0.15); }
        .France { background: rgba(0, 80, 255, 0.15); }

        /* ---------------- TOP 3 ---------------- */
        .top3 {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: gray;
            margin: auto;
            margin-bottom: 5px;
        }

        .pos {
            font-size: 11px;
            color: #9ca3af;
        }

        /* ---------------- FEED ---------------- */
        .feed-item {
            font-size: 12px;
            padding: 6px;
            border-bottom: 1px solid #1f2937;
        }

        /* ---------------- FOOTER ---------------- */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(17, 24, 39, 0.95);
            padding: 10px;
            font-size: 11px;
            color: #9ca3af;
            display: flex;
            justify-content: space-between;
        }

    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="live">🔴 LIVE</div>
    <div class="score" id="score">0 - 0</div>
    <div class="minute" id="minute">0'</div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- LEFT FEED -->
    <div class="panel">
        <h3>Match Feed</h3>
        <div id="feed"></div>
    </div>

    <!-- CENTER -->
    <div class="panel">
        <h3>Top Players</h3>
        <div id="top3" class="top3"></div>

        <h3>Player Impact</h3>
        <div id="players"></div>
    </div>

    <!-- RIGHT -->
    <div class="panel">
        <h3>Match Stats</h3>
        <div class="feed-item">Possession 50/50</div>
        <div class="feed-item">Shots: <span id="shots">0</span></div>
        <div class="feed-item">Goals: <span id="goals">0</span></div>
        <div class="feed-item">Fouls: <span id="fouls">0</span></div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <div>
        ⭐ Captain | 🧤 Goalkeeper | 🔥 Hot form (impact > 15)
    </div>
    <div>
        FIFA 2026 Simulation Engine • FastAPI + Python
    </div>
</div>

<script>

async function updateStatus() {
    const res = await fetch("/match/1/status");
    const data = await res.json();

    document.getElementById("score").innerText = data.score;
    document.getElementById("minute").innerText = data.minute + "'";
}

async function updateFeed() {
    const res = await fetch("/match/1/feed");
    const data = await res.json();

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.forEach(ev => {
        const div = document.createElement("div");
        div.className = "feed-item";
        div.innerText = `${ev.minute}' ${ev.text}`;
        feed.appendChild(div);
    });
}

async function updateImpact() {
    const res = await fetch("/match/1/impact");
    const data = await res.json();

    const container = document.getElementById("players");
    const top3 = document.getElementById("top3");

    container.innerHTML = "";
    top3.innerHTML = "";

    const max = Math.max(...data.map(p => p.impact_score)) || 1;

    let goals = 0, shots = 0, fouls = 0;

    data.forEach((p, index) => {

        const width = (p.impact_score / max) * 100;

        const div = document.createElement("div");
        div.className = `player ${p.team}`;

        div.innerHTML = `
            <div class="name">${p.icons || ""} ${p.name}</div>
            <div style="flex:1; margin:0 10px;">
                <div class="bar" style="width:${width}%; background:${p.team === "Spain" ? "red" : "blue"}"></div>
            </div>
            <div class="scoreval">${p.impact_score}</div>
        `;

        container.appendChild(div);

        if (index < 3) {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="avatar"></div>
                <div>${p.name}</div>
                <div class="pos">${p.position}</div>
                <div>🔥 ${p.impact_score}</div>
            `;
            top3.appendChild(card);
        }
    });
}

async function loop() {
    updateStatus();
    updateImpact();
    updateFeed();
}

setInterval(loop, 2000);
loop();

</script>

</body>
</html>
