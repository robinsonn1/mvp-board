<!DOCTYPE html>
<html>
<head>
    <title>Live Match Impact Board</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* =========================
           TOP HEADER (SCOREBOARD)
        ========================= */
        .header {
            position: sticky;
            top: 0;
            background: #0f172a;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
        }

        .scoreboard {
            font-size: 20px;
            font-weight: bold;
        }

        .minute {
            color: #94a3b8;
        }

        .teams {
            font-size: 14px;
            color: #94a3b8;
        }

        /* =========================
           CONTAINER
        ========================= */
        .container {
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        /* =========================
           PLAYER ROW
        ========================= */
        .player {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111827;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .player:hover {
            transform: scale(1.01);
            background: #1f2937;
        }

        .rank {
            width: 30px;
            color: #94a3b8;
        }

        .name {
            width: 160px;
            font-weight: bold;
        }

        .icons {
            width: 120px;
        }

        .score {
            width: 70px;
            text-align: right;
            color: #22c55e;
        }

        .momentum {
            width: 60px;
            text-align: right;
            color: #fbbf24;
        }

        /* =========================
           BAR
        ========================= */
        .bar-container {
            flex: 1;
            height: 8px;
            background: #1f2937;
            margin: 0 10px;
            border-radius: 4px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            transition: width 0.6s ease;
        }

        .spain { background: #22c55e; }
        .france { background: #ef4444; }

        /* =========================
           MOMENTUM
        ========================= */
        .fire {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

    </style>
</head>

<body>

<!-- =========================
     HEADER (ONE SCOREBOARD ONLY)
========================= -->
<div class="header">
    <div class="scoreboard" id="scoreboard">
        Spain 0 - 0 France
    </div>

    <div class="minute" id="minute">
        0'
    </div>
</div>

<div class="container">
    <h1>⚽ Live Player Impact Board</h1>

    <div id="board"></div>
</div>

<script>

async function fetchStatus() {
    const res = await fetch("/match/1/status");
    const data = await res.json();

    document.getElementById("scoreboard").innerText =
        `${data.home} ${data.score} ${data.away}`;

    document.getElementById("minute").innerText =
        `${data.minute}'`;
}

async function fetchImpact() {
    const res = await fetch("/match/1/impact");
    let data = await res.json();

    const board = document.getElementById("board");
    board.innerHTML = "";

    // normalize max score for bars
    const max = Math.max(...data.map(p => p.impact_score)) || 1;

    data.forEach((p, index) => {

        const width = (p.impact_score / max) * 100;

        const row = document.createElement("div");
        row.className = "player";

        const barClass = p.team === "Spain" ? "spain" : "france";

        const fire = p.momentum > 5 ? "fire" : "";

        row.innerHTML = `
            <div class="rank">${index + 1}</div>

            <div class="name">
                ${p.name}
            </div>

            <div class="icons">
                ${p.icons || ""}
                ${p.momentum > 5 ? "🔥" : ""}
            </div>

            <div class="bar-container">
                <div class="bar ${barClass} ${fire}" style="width:${width}%"></div>
            </div>

            <div class="score">${p.impact_score}</div>

            <div class="momentum">${p.momentum}</div>
        `;

        board.appendChild(row);
    });
}

async function refresh() {
    fetchStatus();
    fetchImpact();
}

setInterval(refresh, 2000);

refresh();

</script>

</body>
</html>
